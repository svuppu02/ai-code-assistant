version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - OPENAI_API_KEY=YOUR_API_KEY
      - DEFAULT_MODEL=gpt-4
      - VECTOR_DB_PATH=/app/data/chroma_db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # We can add more services as needed (e.g., vector database, frontend)